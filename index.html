<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1115;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.cart-btn {
    background: #2ecc71;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    color: black;
}

/* SEARCH */
.search {
    padding: 0 20px 10px;
}

.search input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
}

.cat {
    background: #1a1d23;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.cat.active {
    background: #2ecc71;
    color: black;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1a1d23;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.content {
    padding: 10px;
}

.price {
    color: #2ecc71;
}

button {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.details-btn { background: #2a2d35; color: white; }
.add-btn { background: #2ecc71; color: black; }

.details {
    display: none;
}

/* CART SIDEBAR */
.cart {
    position: fixed;
    right: -300px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #1a1d23;
    padding: 15px;
    transition: 0.3s;
}

.cart.open {
    right: 0;
}
</style>
</head>

<body>

<header>
    🍱 Risilio
    <div class="cart-btn" onclick="toggleCart()">🛒 Carrinho</div>
</header>

<div class="search">
    <input type="text" placeholder="Procurar marmita..." oninput="searchFood(this.value)">
</div>

<div class="categories">
    <div class="cat active" onclick="filter('all', this)">Todos</div>
    <div class="cat" onclick="filter('frango', this)">Frango</div>
    <div class="cat" onclick="filter('peixe', this)">Peixe</div>
    <div class="cat" onclick="filter('veg', this)">Vegetariano</div>
    <div class="cat" onclick="filter('low', this)">Low Carb</div>
</div>

<div class="container" id="menu"></div>

<!-- CARRINHO -->
<div class="cart" id="cartBox">
<h3>🛒 Carrinho</h3>
<ul id="cart"></ul>
<p>Total: €<span id="total">0</span></p>
</div>

<script>
const foods = [
{nome:"Frango + Batata Doce",preco:8.5,cat:"frango",img:"https://images.unsplash.com/photo-1604908176997-43194b3c8f74",desc:"Frango, batata doce"},
{nome:"Frango Low Carb",preco:8,cat:"frango",img:"https://images.unsplash.com/photo-1478145046317-39f10e56b5e9",desc:"Frango e legumes"},
{nome:"Salmão Fit",preco:10,cat:"peixe",img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c",desc:"Salmão e arroz"},
{nome:"Atum Bowl",preco:9,cat:"peixe",img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",desc:"Atum e legumes"},
{nome:"Vegetariano Bowl",preco:7.5,cat:"veg",img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",desc:"Quinoa e legumes"},
{nome:"Omelete Fit",preco:6.5,cat:"low",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061",desc:"Ovos e espinafre"}
];

let carrinho = [];
let filtroAtual = "all";

function render(){
    const menu = document.getElementById("menu");
    menu.innerHTML="";

    const search = document.querySelector("input").value.toLowerCase();

    foods
    .filter(f => (filtroAtual==="all" || f.cat===filtroAtual))
    .filter(f => f.nome.toLowerCase().includes(search))
    .forEach(f => {
        menu.innerHTML += `
        <div class="card">
            <img src="${f.img}">
            <div class="content">
                <b>${f.nome}</b>
                <div class="price">€${f.preco}</div>

                <button class="details-btn" onclick="toggle(this)">Ver detalhes</button>
                <div class="details">${f.desc}</div>

                <button class="add-btn" onclick="add('${f.nome}', ${f.preco})">Adicionar</button>
            </div>
        </div>`;
    });
}

function toggle(btn){
    const d = btn.nextElementSibling;
    d.style.display = d.style.display==="block" ? "none" : "block";
}

function add(nome, preco){
    carrinho.push(preco);

    const li = document.createElement("li");
    li.textContent = nome + " €" + preco;

    li.onclick = () => {
        li.remove();
        carrinho.splice(carrinho.indexOf(preco),1);
        updateTotal();
    };

    document.getElementById("cart").appendChild(li);
    updateTotal();
}

function updateTotal(){
    const total = carrinho.reduce((a,b)=>a+b,0);
    document.getElementById("total").textContent = total.toFixed(2);
}

function filter(cat, el){
    filtroAtual = cat;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    render();
}

function searchFood(){
    render();
}

function toggleCart(){
    document.getElementById("cartBox").classList.toggle("open");
}

render();
</script>

</body>
</html>
