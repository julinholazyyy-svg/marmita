<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f7f9fc;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    width: 260px;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* TITLE */
.card h3 {
    margin: 10px 0 5px;
}

/* PRICE */
.price {
    color: #27ae60;
    font-weight: bold;
    margin-bottom: 10px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn-details {
    background: #ecf0f1;
}

.btn-cart {
    background: #27ae60;
    color: white;
}

/* DETAILS */
.details {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
    font-size: 14px;
    color: #555;
}

/* CART */
.cart {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    padding: 15px;
    border-radius: 15px;
    width: 220px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.cart h3 {
    margin-top: 0;
}

.cart-count {
    background: #27ae60;
    color: white;
    border-radius: 50%;
    padding: 5px 10px;
    font-size: 12px;
}
</style>

</head>
<body>

<header>
🍱 Risilio - Marmitas Fitness
</header>

<div class="cart">
    <h3>Carrinho <span id="count" class="cart-count">0</span></h3>
    <ul id="cart-list"></ul>
</div>

<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h3>Frango + Batata Doce</h3>
        <div class="price">€8.50</div>

        <button class="btn btn-details" onclick="toggleDetails(this)">Ver detalhes</button>
        <div class="details">
            Frango grelhado, batata doce, brócolos
        </div>

        <button class="btn btn-cart" onclick="addToCart('Frango + Batata Doce')">Adicionar</button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h3>Salmão + Arroz Integral</h3>
        <div class="price">€10.00</div>

        <button class="btn btn-details" onclick="toggleDetails(this)">Ver detalhes</button>
        <div class="details">
            Salmão grelhado, arroz integral, legumes
        </div>

        <button class="btn btn-cart" onclick="addToCart('Salmão + Arroz Integral')">Adicionar</button>
    </div>

</div>

<script>
let count = 0;

function toggleDetails(button) {
    const details = button.nextElementSibling;

    if (details.style.maxHeight) {
        details.style.maxHeight = null;
    } else {
        details.style.maxHeight = details.scrollHeight + "px";
    }
}

function addToCart(item) {
    const list = document.getElementById("cart-list");
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);

    count++;
    document.getElementById("count").textContent = count;
}
</script>

</body>
</html>
