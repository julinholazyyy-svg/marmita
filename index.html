<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio - App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

/* LOGIN */
.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f1115;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
}

.loginBox{
background:#1a1d23;
padding:20px;
border-radius:12px;
width:300px;
}

.loginBox input,
.loginBox select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

.loginBtn{
background:#2ecc71;
color:black;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}

/* SITE */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
}

.cart-btn{
background:#2ecc71;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
color:black;
position:relative;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.delivery{
padding:10px 20px;
color:#aaa;
font-size:14px;
}

.search{
padding:10px 20px;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1d23;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:12px;
}

.title{
font-size:17px;
font-weight:bold;
}

.price{
color:#2ecc71;
font-weight:bold;
margin-top:5px;
}

button{
width:100%;
margin-top:6px;
padding:9px;
border:none;
border-radius:8px;
cursor:pointer;
}

.details-btn{background:#2a2d35;color:white}
.add-btn{background:#2ecc71;color:black}
.fav-btn{background:#ff4d6d;color:white}

.details{
display:none;
font-size:13px;
color:#aaa;
}

/* CART */
.cart{
position:fixed;
right:-320px;
top:0;
width:280px;
height:100%;
background:#1a1d23;
padding:15px;
transition:0.3s;
z-index:1000;
}

.cart.open{right:0}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

.overlay.show{display:block}

/* CHECKOUT */
.checkoutPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f1115;
display:none;
padding:20px;
z-index:2000;
}

.checkoutPage input,
.checkoutPage select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

.confirm{
background:#2ecc71;
color:black;
padding:10px;
border-radius:8px;
cursor:pointer;
text-align:center;
margin-top:10px;
}

/* CONFIRMED */
.confirmed{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f1115;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:3000;
}

.check{
font-size:60px;
color:#2ecc71;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="loginBox">

<h2>🍱 Risilio Login</h2>

<input id="userName" placeholder="Nome">
<input id="age" type="number" placeholder="Idade">

<select id="cityLogin">
<option value="">Localidade</option>
<option>Porto</option>
<option>Braga</option>
<option>Guimarães</option>
</select>

<button class="loginBtn" onclick="enterSite()">
Entrar
</button>

</div>
</div>

<!-- SITE -->
<header>
🍱 Risilio
<div class="cart-btn" onclick="toggleCart()">
🛒 <span class="badge" id="badge">0</span>
</div>
</header>

<div class="delivery">
📍 Entregamos em: <b>Braga • Porto • Guimarães</b>
</div>

<div class="search">
<input type="text" placeholder="Procurar..." oninput="render()">
</div>

<div class="container" id="menu"></div>

<!-- CART -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart" id="cartBox">
<h3>🛒 Carrinho</h3>
<ul id="cart"></ul>
<p>Total: €<span id="total">0</span></p>

<div class="confirm" onclick="openCheckout()">
Finalizar Pedido
</div>
</div>

<!-- CHECKOUT -->
<div class="checkoutPage" id="checkoutPage">

<h2>Checkout</h2>

<input id="name" placeholder="Nome">
<input id="address" placeholder="Morada">
<input id="phone" placeholder="Telefone">

<select id="city">
<option value="">Escolher localidade</option>
<option>Porto</option>
<option>Braga</option>
<option>Guimarães</option>
</select>

<div class="confirm" onclick="confirmOrder()">
Confirmar Pedido
</div>
</div>

<!-- CONFIRMADO -->
<div class="confirmed" id="confirmed">
<div class="check">✔</div>
<h2>Pedido Confirmado!</h2>
<p>Entregamos em breve 🚚</p>
</div>

<script>

let carrinho=[];

/* LOGIN */
function enterSite(){

const name=document.getElementById("userName").value;
const age=document.getElementById("age").value;
const city=document.getElementById("cityLogin").value;

if(!name || !age || !city){
alert("Preenche todos os campos!");
return;
}

document.getElementById("login").style.display="none";
}

/* MENU */
const foods=[
{nome:"Frango + Quinoa Fit",preco:9,img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=800&q=80",desc:"Frango com quinoa",fav:false},
{nome:"Salmão Premium",preco:11,img:"https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=800&q=80",desc:"Salmão grelhado",fav:false},
{nome:"Salada Proteica",preco:7,img:"https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=800&q=80",desc:"Salada saudável",fav:false}
];

function render(){
const menu=document.getElementById("menu");
const search=document.querySelector(".search input").value.toLowerCase();
menu.innerHTML="";

foods.filter(f=>f.nome.toLowerCase().includes(search))
.forEach((f,i)=>{
menu.innerHTML+=`
<div class="card">
<img src="${f.img}">
<div class="content">

<div class="title">${f.nome}</div>
<div class="price">€${f.preco}</div>

<button class="details-btn" onclick="toggle(this)">Detalhes</button>
<div class="details">${f.desc}</div>

<button class="add-btn" onclick="add('${f.nome}',${f.preco})">Adicionar</button>

</div>
</div>`;
});
}

function toggle(btn){
const d=btn.nextElementSibling;
d.style.display=d.style.display==="block"?"none":"block";
}

/* CART */
function add(nome,preco){
carrinho.push(preco);
document.getElementById("cart").innerHTML+=`<li>${nome} €${preco}</li>`;
updateTotal();
}

function updateTotal(){
document.getElementById("total").innerText=
carrinho.reduce((a,b)=>a+b,0).toFixed(2);

document.getElementById("badge").innerText=carrinho.length;
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

function closeCart(){
document.getElementById("cartBox").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
}

/* CHECKOUT */
function openCheckout(){
document.getElementById("checkoutPage").style.display="block";
}

function confirmOrder(){

const name=document.getElementById("name").value;
const address=document.getElementById("address").value;
const phone=document.getElementById("phone").value;
const city=document.getElementById("city").value;

if(!name || !address || !phone || !city){
alert("Preenche todos os campos!");
return;
}

document.getElementById("checkoutPage").style.display="none";
document.getElementById("confirmed").style.display="flex";

carrinho=[];
document.getElementById("cart").innerHTML="";
updateTotal();
}

render();

</script>

</body>
</html>
