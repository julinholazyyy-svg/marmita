<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1115;
    color: white;
}

/* HEADER */
header {
    padding: 20px;
    font-size: 26px;
    font-weight: bold;
}

/* CATEGORIAS */
.categories {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
}

.cat {
    background: #1a1d23;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.cat.active {
    background: #2ecc71;
    color: black;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1a1d23;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.content {
    padding: 10px;
}

.price {
    color: #2ecc71;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.details-btn { background: #2a2d35; color: white; }
.add-btn { background: #2ecc71; color: black; }

.details {
    display: none;
    font-size: 13px;
}

/* CART */
.cart {
    position: fixed;
    right: 0;
    top: 0;
    width: 260px;
    height: 100%;
    background: #1a1d23;
    padding: 15px;
}

.cart li {
    margin-bottom: 5px;
}
</style>
</head>

<body>

<header>🍱 Risilio</header>

<div class="categories">
    <div class="cat active" onclick="filter('all', this)">Todos</div>
    <div class="cat" onclick="filter('frango', this)">Frango</div>
    <div class="cat" onclick="filter('peixe', this)">Peixe</div>
    <div class="cat" onclick="filter('veg', this)">Vegetariano</div>
    <div class="cat" onclick="filter('low', this)">Low Carb</div>
</div>

<div class="container" id="menu"></div>

<div class="cart">
<h3>🛒 Carrinho</h3>
<ul id="cart"></ul>
<p>Total: €<span id="total">0</span></p>
</div>

<script>
const foods = [
{nome:"Frango + Batata Doce",preco:8.5,cat:"frango",img:"https://images.unsplash.com/photo-1604908176997-43194b3c8f74",desc:"Frango, batata doce"},
{nome:"Frango Low Carb",preco:8,cat:"frango",img:"https://images.unsplash.com/photo-1478145046317-39f10e56b5e9",desc:"Frango e legumes"},
{nome:"Frango + Arroz",preco:9,cat:"frango",img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836",desc:"Frango e arroz"},
{nome:"Salmão Fit",preco:10,cat:"peixe",img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c",desc:"Salmão e arroz"},
{nome:"Atum Bowl",preco:9,cat:"peixe",img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",desc:"Atum e legumes"},
{nome:"Vegetariano Bowl",preco:7.5,cat:"veg",img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd",desc:"Quinoa e legumes"},
{nome:"Omelete Fit",preco:6.5,cat:"low",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061",desc:"Ovos e espinafre"},
{nome:"Carne + Legumes",preco:9.5,cat:"low",img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836",desc:"Carne magra"},
{nome:"Frango + Quinoa",preco:8.8,cat:"frango",img:"https://images.unsplash.com/photo-1604908176997-43194b3c8f74",desc:"Frango e quinoa"}
];

let carrinho = [];

function render(filter="all"){
    const menu = document.getElementById("menu");
    menu.innerHTML="";

    foods
    .filter(f => filter==="all" || f.cat===filter)
    .forEach(f => {
        menu.innerHTML += `
        <div class="card">
            <img src="${f.img}">
            <div class="content">
                <b>${f.nome}</b>
                <div class="price">€${f.preco}</div>

                <button class="details-btn" onclick="toggle(this)">Ver detalhes</button>
                <div class="details">${f.desc}</div>

                <button class="add-btn" onclick="add('${f.nome}', ${f.preco})">Adicionar</button>
            </div>
        </div>`;
    });
}

function toggle(btn){
    const d = btn.nextElementSibling;
    d.style.display = d.style.display==="block" ? "none" : "block";
}

function add(nome, preco){
    carrinho.push(preco);

    const li = document.createElement("li");
    li.textContent = nome + " €" + preco;

    li.onclick = () => {
        li.remove();
        carrinho.splice(carrinho.indexOf(preco),1);
        updateTotal();
    };

    document.getElementById("cart").appendChild(li);
    updateTotal();
}

function updateTotal(){
    const total = carrinho.reduce((a,b)=>a+b,0);
    document.getElementById("total").textContent = total.toFixed(2);
}

function filter(cat, el){
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    render(cat);
}

render();
</script>

</body>
</html>
