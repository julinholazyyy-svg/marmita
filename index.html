<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio - App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
}

.cart-btn{
background:#2ecc71;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
color:black;
}

/* DELIVERY INFO */
.delivery{
padding:10px 20px;
color:#aaa;
font-size:14px;
}

/* SEARCH */
.search{
padding:10px 20px;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

/* CATEGORIES */
.categories{
display:flex;
gap:10px;
padding:10px 20px;
}

.cat{
background:#1a1d23;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.cat.active{
background:#2ecc71;
color:black;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#1a1d23;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:12px;
}

.title{
font-size:17px;
font-weight:bold;
}

.price{
color:#2ecc71;
font-weight:bold;
margin-top:5px;
}

button{
width:100%;
margin-top:6px;
padding:9px;
border:none;
border-radius:8px;
cursor:pointer;
}

.details-btn{background:#2a2d35;color:white}
.add-btn{background:#2ecc71;color:black}

.details{
display:none;
font-size:13px;
color:#aaa;
}

/* CART */
.cart{
position:fixed;
right:-320px;
top:0;
width:280px;
height:100%;
background:#1a1d23;
padding:15px;
transition:0.3s;
z-index:1000;
}

.cart.open{right:0}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

.overlay.show{display:block}

/* CHECKOUT BUTTON */
.checkout{
background:#2ecc71;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header>
🍱 Risilio
<div class="cart-btn" onclick="toggleCart()">🛒 Carrinho</div>
</header>

<!-- LOCALIDADES -->
<div class="delivery">
📍 Entregamos em: <b>Braga • Porto • Guimarães</b>
</div>

<div class="search">
<input type="text" placeholder="Procurar marmita..." oninput="render()">
</div>

<div class="categories">
<div class="cat active" onclick="setFilter('all',this)">Todos</div>
<div class="cat" onclick="setFilter('frango',this)">Frango</div>
<div class="cat" onclick="setFilter('peixe',this)">Peixe</div>
<div class="cat" onclick="setFilter('veg',this)">Vegetariano</div>
<div class="cat" onclick="setFilter('low',this)">Low Carb</div>
</div>

<div class="container" id="menu"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- CART -->
<div class="cart" id="cartBox">
<h3>🛒 Carrinho</h3>

<ul id="cart"></ul>

<p>Total: €<span id="total">0</span></p>

<div class="checkout" onclick="checkout()">
Finalizar Pedido
</div>

</div>

<script>

const foods = [
{nome:"Frango + Batata Doce",preco:8.5,cat:"frango",img:"https://images.pexels.com/photos/376464/pexels-photo-376464.jpeg",desc:"Frango grelhado com batata doce"},
{nome:"Frango + Quinoa Fit",preco:9,cat:"frango",img:"https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg",desc:"Frango com quinoa saudável"},
{nome:"Wrap de Frango",preco:7.8,cat:"frango",img:"https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg",desc:"Wrap saudável"},
{nome:"Frango + Arroz Integral",preco:9,cat:"frango",img:"https://images.pexels.com/photos/1640774/pexels-photo-1640774.jpeg",desc:"Frango e arroz"},

{nome:"Salmão Premium",preco:11,cat:"peixe",img:"https://images.pexels.com/photos/329643/pexels-photo-329643.jpeg",desc:"Salmão grelhado"},
{nome:"Atum Bowl",preco:9,cat:"peixe",img:"https://images.pexels.com/photos/725991/pexels-photo-725991.jpeg",desc:"Atum saudável"},
{nome:"Tilápia Fit",preco:9.5,cat:"peixe",img:"https://images.pexels.com/photos/46239/salmon-dish-food-meal-46239.jpeg",desc:"Peixe leve"},

{nome:"Bowl Vegetariano",preco:7.5,cat:"veg",img:"https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg",desc:"Quinoa e legumes"},
{nome:"Salada Proteica",preco:7,cat:"veg",img:"https://images.pexels.com/photos/1540420773420-3366772f4999.jpeg",desc:"Salada fresca"},

{nome:"Omelete Fit",preco:6.5,cat:"low",img:"https://images.pexels.com/photos/1525351484163-7529414344d8.jpeg",desc:"Ovos e espinafre"},
{nome:"Carne + Legumes",preco:9.5,cat:"low",img:"https://images.pexels.com/photos/1550547660-d9450f859349.jpeg",desc:"Carne magra"}
];

let carrinho=[];
let filtro="all";

function render(){
const menu=document.getElementById("menu");
const search=document.querySelector("input").value.toLowerCase();
menu.innerHTML="";

foods
.filter(f=>filtro==="all"||f.cat===filtro)
.filter(f=>f.nome.toLowerCase().includes(search))
.forEach(f=>{
menu.innerHTML+=`
<div class="card">
<img src="${f.img}">
<div class="content">
<div class="title">${f.nome}</div>
<div class="price">€${f.preco}</div>

<button class="details-btn" onclick="toggle(this)">Detalhes</button>
<div class="details">${f.desc}</div>

<button class="add-btn" onclick="add('${f.nome}',${f.preco})">Adicionar</button>
</div>
</div>`;
});
}

function toggle(btn){
const d=btn.nextElementSibling;
d.style.display=d.style.display==="block"?"none":"block";
}

function add(nome,preco){
carrinho.push(preco);

const li=document.createElement("li");
li.textContent=nome+" €"+preco;

li.onclick=()=>{
li.remove();
carrinho.splice(carrinho.indexOf(preco),1);
updateTotal();
};

document.getElementById("cart").appendChild(li);
updateTotal();
}

function updateTotal(){
const total=carrinho.reduce((a,b)=>a+b,0);
document.getElementById("total").textContent=total.toFixed(2);
}

function setFilter(cat,el){
filtro=cat;
document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
render();
}

/* CART */
function toggleCart(){
document.getElementById("cartBox").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

function closeCart(){
document.getElementById("cartBox").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
}

/* CHECKOUT */
function checkout(){
alert("Pedido enviado! Entregamos em Braga, Porto e Guimarães 🚚");
}

render();
</script>

</body>
</html>
