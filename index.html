<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Risilio</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
}

/* SIDEBAR */
.cart {
    width: 300px;
    background: #1a1d23;
    height: 100vh;
    padding: 20px;
    position: fixed;
    right: 0;
    top: 0;
    border-left: 1px solid #2a2d35;
}

.cart h2 {
    margin-top: 0;
}

.cart ul {
    padding-left: 18px;
    color: #ccc;
}

/* MAIN */
.main {
    flex: 1;
    padding-right: 320px;
}

/* HEADER */
header {
    padding: 20px 30px;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid #2a2d35;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 25px;
}

/* CARD */
.card {
    background: #1a1d23;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.2s;
    border: 1px solid #2a2d35;
}

.card:hover {
    transform: scale(1.02);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* CONTENT */
.content {
    padding: 15px;
}

.title {
    font-size: 17px;
    font-weight: 600;
}

.price {
    color: #2ecc71;
    font-weight: bold;
    margin: 6px 0;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 8px;
    font-weight: 600;
}

.details-btn {
    background: #2a2d35;
    color: #ccc;
}

.add-btn {
    background: #2ecc71;
    color: black;
}

/* DETAILS */
.details {
    display: none;
    font-size: 14px;
    color: #aaa;
    margin-top: 8px;
}
</style>

</head>
<body>

<div class="main">

<header>
🍱 Risilio
</header>

<div class="container">

<!-- CARD 1 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-43194b3c8f74">
    <div class="content">
        <div class="title">Frango + Batata Doce</div>
        <div class="price">€8.50</div>

        <button class="btn details-btn" onclick="toggleDetails(this)">
            Ver detalhes
        </button>

        <div class="details">
            Frango grelhado, batata doce, brócolos
        </div>

        <button class="btn add-btn" onclick="addToCart('Frango + Batata Doce')">
            Adicionar
        </button>
    </div>
</div>

<!-- CARD 2 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
    <div class="content">
        <div class="title">Salmão + Arroz Integral</div>
        <div class="price">€10.00</div>

        <button class="btn details-btn" onclick="toggleDetails(this)">
            Ver detalhes
        </button>

        <div class="details">
            Salmão grelhado, arroz integral, legumes
        </div>

        <button class="btn add-btn" onclick="addToCart('Salmão + Arroz Integral')">
            Adicionar
        </button>
    </div>
</div>

</div>

</div>

<!-- CARRINHO -->
<div class="cart">
    <h2>🛒 Carrinho</h2>
    <ul id="cart-list"></ul>
</div>

<script>
function toggleDetails(btn) {
    const details = btn.nextElementSibling;
    details.style.display = details.style.display === "block" ? "none" : "block";
}

function addToCart(item) {
    const list = document.getElementById("cart-list");
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
}
</script>

</body>
</html>
